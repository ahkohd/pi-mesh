name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (no publish, no push)
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.new }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install npm dependencies
        run: npm ci --omit=optional

      - name: Calculate new version
        id: version
        run: |
          current=$(grep -m1 '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumping $current -> $new"

      - name: Update Cargo version
        run: |
          sed -i '0,/^version = "[^"]*"/s//version = "${{ steps.version.outputs.new }}"/' Cargo.toml
          cargo update

      - name: Update npm package versions
        run: |
          node scripts/sync-npm-version.cjs "${{ steps.version.outputs.new }}"
          npm install --package-lock-only --omit=optional

      - name: Build and check packages
        run: |
          cargo fmt --all -- --check
          cargo clippy --bins -- -D warnings
          cargo test
          npm run typecheck
          npm run build
          cargo publish --dry-run --allow-dirty
          npm pack --dry-run

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git add Cargo.toml Cargo.lock package.json package-lock.json
          git add npm/darwin-arm64/package.json npm/darwin-x64/package.json
          git add npm/linux-arm64-gnu/package.json npm/linux-x64-gnu/package.json
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Publish crate
        if: ${{ !inputs.dry_run }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current version: ${{ steps.version.outputs.current }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- New version: ${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Would commit, tag, and push v${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Would publish pi-mesh to crates.io" >> "$GITHUB_STEP_SUMMARY"
          echo "- Would build and publish npm packages:" >> "$GITHUB_STEP_SUMMARY"
          echo "  - @ahkohd/pi-mesh-darwin-arm64@${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "  - @ahkohd/pi-mesh-darwin-x64@${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "  - @ahkohd/pi-mesh-linux-arm64-gnu@${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "  - @ahkohd/pi-mesh-linux-x64-gnu@${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "  - @ahkohd/pi-mesh@${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (${{ matrix.target }})
    needs: release
    if: ${{ !inputs.dry_run }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (Linux ARM64 cross)
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build
        if: ${{ matrix.target != 'aarch64-unknown-linux-gnu' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../pi-mesh-${{ matrix.target }}.tar.gz pi-mesh pi-mesh-tailscale

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pi-mesh-${{ matrix.target }}
          path: pi-mesh-${{ matrix.target }}.tar.gz

  publish-npm:
    name: Publish npm packages
    needs: [release, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install npm dependencies
        run: npm ci --omit=optional

      - name: Build npm package
        run: npm run build

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage npm packages
        run: |
          STAGE_DIR="${RUNNER_TEMP}/pi-mesh-npm"
          rm -rf "${STAGE_DIR}"
          mkdir -p "${STAGE_DIR}"

          mkdir -p "${STAGE_DIR}/main"
          cp -R package.json README.md LICENSE.md bin dist "${STAGE_DIR}/main"

          mkdir -p "${STAGE_DIR}/darwin-arm64"
          cp -R npm/darwin-arm64/. "${STAGE_DIR}/darwin-arm64"
          rm -f "${STAGE_DIR}/darwin-arm64/bin/.gitkeep"
          tar -xzf artifacts/pi-mesh-aarch64-apple-darwin.tar.gz -C "${STAGE_DIR}/darwin-arm64/bin"
          chmod +x "${STAGE_DIR}/darwin-arm64/bin/pi-mesh" "${STAGE_DIR}/darwin-arm64/bin/pi-mesh-tailscale"

          mkdir -p "${STAGE_DIR}/darwin-x64"
          cp -R npm/darwin-x64/. "${STAGE_DIR}/darwin-x64"
          rm -f "${STAGE_DIR}/darwin-x64/bin/.gitkeep"
          tar -xzf artifacts/pi-mesh-x86_64-apple-darwin.tar.gz -C "${STAGE_DIR}/darwin-x64/bin"
          chmod +x "${STAGE_DIR}/darwin-x64/bin/pi-mesh" "${STAGE_DIR}/darwin-x64/bin/pi-mesh-tailscale"

          mkdir -p "${STAGE_DIR}/linux-x64-gnu"
          cp -R npm/linux-x64-gnu/. "${STAGE_DIR}/linux-x64-gnu"
          rm -f "${STAGE_DIR}/linux-x64-gnu/bin/.gitkeep"
          tar -xzf artifacts/pi-mesh-x86_64-unknown-linux-gnu.tar.gz -C "${STAGE_DIR}/linux-x64-gnu/bin"
          chmod +x "${STAGE_DIR}/linux-x64-gnu/bin/pi-mesh" "${STAGE_DIR}/linux-x64-gnu/bin/pi-mesh-tailscale"

          mkdir -p "${STAGE_DIR}/linux-arm64-gnu"
          cp -R npm/linux-arm64-gnu/. "${STAGE_DIR}/linux-arm64-gnu"
          rm -f "${STAGE_DIR}/linux-arm64-gnu/bin/.gitkeep"
          tar -xzf artifacts/pi-mesh-aarch64-unknown-linux-gnu.tar.gz -C "${STAGE_DIR}/linux-arm64-gnu/bin"
          chmod +x "${STAGE_DIR}/linux-arm64-gnu/bin/pi-mesh" "${STAGE_DIR}/linux-arm64-gnu/bin/pi-mesh-tailscale"

          echo "STAGE_DIR=${STAGE_DIR}" >> "$GITHUB_ENV"

      - name: npm package dry run
        run: |
          npm pack --dry-run "${STAGE_DIR}/darwin-arm64"
          npm pack --dry-run "${STAGE_DIR}/darwin-x64"
          npm pack --dry-run "${STAGE_DIR}/linux-x64-gnu"
          npm pack --dry-run "${STAGE_DIR}/linux-arm64-gnu"
          npm pack --dry-run "${STAGE_DIR}/main"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages
        run: |
          npm publish "${STAGE_DIR}/darwin-arm64" --provenance --access public
          npm publish "${STAGE_DIR}/darwin-x64" --provenance --access public
          npm publish "${STAGE_DIR}/linux-x64-gnu" --provenance --access public
          npm publish "${STAGE_DIR}/linux-arm64-gnu" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm index
        run: sleep 15

      - name: Publish main package
        run: npm publish "${STAGE_DIR}/main" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    name: Publish GitHub Release
    needs: [release, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.release.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
